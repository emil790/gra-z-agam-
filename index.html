<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nakarm Agamę 🦎</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --sand: #e8c97a;
    --dark-sand: #c9a84c;
    --sky: #7ec8e3;
    --deep-sky: #3a8fbf;
    --btn-blue: #1e7fcb;
    --text-dark: #2d1f0e;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Nunito', sans-serif; min-height: 100vh; overflow-x: hidden; background: #87CEEB; }

  /* BACKGROUND */
  .bg { position: fixed; inset: 0; z-index: 0; overflow: hidden; }
  .sky-gradient { position: absolute; inset: 0; background: linear-gradient(180deg,#4aa8d8 0%,#7ecce8 40%,#b8e4d0 70%,#d4c084 85%,#c9a850 100%); }
  .sun { position: absolute; top: 60px; right: 120px; width: 90px; height: 90px; background: radial-gradient(circle,#fff7aa 30%,#ffcc00 60%,#ff9900 100%); border-radius: 50%; box-shadow: 0 0 40px 20px rgba(255,200,0,.4),0 0 80px 40px rgba(255,180,0,.2); animation: sunPulse 4s ease-in-out infinite; }
  @keyframes sunPulse { 0%,100%{box-shadow:0 0 40px 20px rgba(255,200,0,.4),0 0 80px 40px rgba(255,180,0,.2)}50%{box-shadow:0 0 60px 30px rgba(255,200,0,.5),0 0 100px 50px rgba(255,180,0,.3)} }
  .cloud { position: absolute; background: rgba(255,255,255,.85); border-radius: 50px; animation: drift linear infinite; }
  .cloud::before,.cloud::after { content:''; position: absolute; background: rgba(255,255,255,.85); border-radius: 50%; }
  .cloud-1{width:120px;height:40px;top:80px;left:-140px;animation-duration:28s}
  .cloud-1::before{width:60px;height:60px;top:-30px;left:15px}
  .cloud-1::after{width:40px;height:40px;top:-20px;left:55px}
  .cloud-2{width:90px;height:30px;top:150px;left:-110px;animation-duration:35s;animation-delay:-10s;opacity:.7}
  .cloud-2::before{width:45px;height:45px;top:-22px;left:10px}
  .cloud-2::after{width:35px;height:35px;top:-15px;left:42px}
  .cloud-3{width:150px;height:45px;top:50px;left:-170px;animation-duration:40s;animation-delay:-20s;opacity:.6}
  .cloud-3::before{width:70px;height:70px;top:-35px;left:20px}
  .cloud-3::after{width:50px;height:50px;top:-25px;left:70px}
  @keyframes drift { from{transform:translateX(0)} to{transform:translateX(calc(100vw + 200px))} }
  .ground { position:absolute; bottom:0; left:0; right:0; height:220px; background:linear-gradient(180deg,#c9a850 0%,#a07830 60%,#7a5a20 100%); border-radius:60% 60% 0 0/30px 30px 0 0; }
  .rock { position:absolute; background:linear-gradient(135deg,#9e8060,#6a4e2a); border-radius:40% 60% 55% 45%/50% 45% 55% 50%; box-shadow:inset -5px -5px 15px rgba(0,0,0,.3); }
  .rock-1{width:80px;height:50px;bottom:100px;left:8%}
  .rock-2{width:120px;height:70px;bottom:90px;left:20%}
  .rock-3{width:60px;height:40px;bottom:110px;right:15%}
  .rock-4{width:100px;height:60px;bottom:85px;right:5%}
  .cactus { position:absolute; bottom:175px; }
  .cactus-body { width:22px; background:linear-gradient(90deg,#4a7a2e,#6aaa3e,#4a7a2e); border-radius:12px; margin:0 auto; }
  .cactus-arm { position:absolute; width:16px; background:linear-gradient(90deg,#4a7a2e,#6aaa3e); border-radius:8px; }
  .cactus-1{left:5%} .cactus-1 .cactus-body{height:70px} .cactus-1 .cactus-arm{height:30px;top:20px;left:18px;transform:rotate(-30deg);transform-origin:left center}
  .cactus-2{right:8%} .cactus-2 .cactus-body{height:90px} .cactus-2 .cactus-arm{height:35px;top:25px;right:18px;transform:rotate(30deg);transform-origin:right center} .cactus-2 .cactus-arm2{height:25px;top:50px;left:18px;transform:rotate(-25deg);transform-origin:left center}
  .fly { position:absolute; font-size:18px; animation:flyAround linear infinite; opacity:.5; }
  .fly-1{animation-duration:12s;animation-delay:-3s;top:35%}
  .fly-2{animation-duration:18s;animation-delay:-8s;top:55%;font-size:14px}
  .fly-3{animation-duration:22s;animation-delay:-15s;top:25%;font-size:22px}
  @keyframes flyAround { 0%{left:-30px;transform:scaleX(1)} 49%{transform:scaleX(1)} 50%{left:calc(100vw + 30px);transform:scaleX(-1)} 99%{transform:scaleX(-1)} 100%{left:-30px;transform:scaleX(1)} }

  /* PAGES */
  .page { position:relative; z-index:10; min-height:100vh; display:none; flex-direction:column; align-items:center; justify-content:center; padding:20px; }
  .page.active { display:flex; }

  /* CARDS */
  .card { background:rgba(255,248,225,.93); backdrop-filter:blur(8px); border-radius:32px; padding:32px 40px 36px; box-shadow:0 20px 60px rgba(100,60,0,.3),0 4px 12px rgba(0,0,0,.15); border:3px solid rgba(255,220,100,.6); text-align:center; max-width:480px; width:100%; }

  .page-title { font-family:'Fredoka One',cursive; font-size:2.4rem; color:var(--text-dark); margin-bottom:6px; text-shadow:2px 2px 0 rgba(255,200,0,.3); }
  .page-sub { font-size:.95rem; color:#7a5a2a; margin-bottom:20px; font-weight:600; }

  .agama-art { font-size:120px; line-height:1; margin:10px 0 20px; display:block; filter:drop-shadow(4px 8px 12px rgba(0,0,0,.2)); animation:agamaBreathe 3s ease-in-out infinite; cursor:pointer; }
  @keyframes agamaBreathe { 0%,100%{transform:scale(1) rotate(-1deg)} 50%{transform:scale(1.04) rotate(1deg)} }

  .hunger-label { font-size:.85rem; font-weight:700; color:#a07030; margin-bottom:6px; text-transform:uppercase; letter-spacing:1px; }
  .hunger-bar { height:14px; background:#e0cfa0; border-radius:10px; overflow:hidden; border:2px solid #c9a050; margin-bottom:20px; }
  .hunger-fill { height:100%; background:linear-gradient(90deg,#ff9500,#ffcc00); border-radius:10px; transition:width .6s ease; }

  /* BUTTONS */
  .btn { display:inline-block; font-family:'Fredoka One',cursive; font-size:1.5rem; color:#fff; background:linear-gradient(160deg,#2d9ee0,#1560a0); border:none; border-radius:20px; padding:16px 48px; cursor:pointer; box-shadow:0 8px 0 #0a3d6e,0 10px 25px rgba(0,100,200,.35); transition:transform .1s,box-shadow .1s; letter-spacing:.5px; position:relative; overflow:hidden; width:100%; margin-top:6px; }
  .btn::before { content:''; position:absolute; top:0; left:-100%; width:60%; height:100%; background:rgba(255,255,255,.15); transform:skewX(-20deg); transition:left .4s; }
  .btn:hover::before { left:140%; }
  .btn:hover { background:linear-gradient(160deg,#3aaef0,#1a72b8); }
  .btn:active { transform:translateY(4px); box-shadow:0 4px 0 #0a3d6e,0 6px 15px rgba(0,100,200,.35); }
  .btn-sm { font-size:1.25rem; padding:13px 36px; }

  /* LUCKY BLOCK */
  .lucky-block-wrap { perspective:400px; margin:0 auto 28px; width:130px; height:130px; }
  .lucky-block { width:130px; height:130px; position:relative; transform-style:preserve-3d; animation:spinBlock 2.5s linear infinite; }
  @keyframes spinBlock { 0%{transform:rotateY(0deg) rotateX(8deg)} 100%{transform:rotateY(360deg) rotateX(8deg)} }
  .lb-face { position:absolute; width:130px; height:130px; background:linear-gradient(135deg,#ffe033,#f5c518,#e6a800); border:4px solid #a07800; border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:50px; box-shadow:inset 0 0 20px rgba(255,255,255,.3),inset 0 0 40px rgba(200,140,0,.2); backface-visibility:visible; }
  .lb-front{transform:translateZ(65px)}
  .lb-back{transform:rotateY(180deg) translateZ(65px)}
  .lb-right{transform:rotateY(90deg) translateZ(65px)}
  .lb-left{transform:rotateY(-90deg) translateZ(65px)}
  .lb-top{transform:rotateX(90deg) translateZ(65px)}
  .lb-bottom{transform:rotateX(-90deg) translateZ(65px)}
  .lb-face::after { content:'?'; font-family:'Fredoka One',cursive; font-size:52px; color:#a07800; text-shadow:2px 2px 0 rgba(255,255,255,.5); }
  .lb-face.revealed::after { display:none; }

  .odds-frame { border:3px solid #c9a050; background:rgba(255,240,180,.7); border-radius:16px; padding:14px 24px; margin-bottom:22px; font-size:1.15rem; font-weight:800; color:var(--text-dark); letter-spacing:1px; display:flex; gap:16px; justify-content:center; flex-wrap:wrap; }
  .odds-pct { font-size:.85rem; color:#7a5020; font-weight:700; }

  /* EXPLOSION */
  .explosion-overlay { position:fixed; inset:0; z-index:100; pointer-events:none; display:none; }
  .explosion-overlay.boom { display:block; }
  .particle { position:absolute; width:12px; height:12px; border-radius:50%; animation:explode .8s ease-out forwards; }
  @keyframes explode { 0%{transform:translate(0,0) scale(1);opacity:1} 100%{transform:translate(var(--dx),var(--dy)) scale(0);opacity:0} }

  /* RESULT */
  .result-title { font-family:'Fredoka One',cursive; font-size:2rem; margin-bottom:10px; line-height:1.3; }
  .result-title.win{color:#2a7e1f} .result-title.fail{color:#c0392b} .result-title.nothungry{color:#e67e22}
  .result-big-emoji { font-size:80px; display:block; margin:10px 0; animation:rewardPop .5s cubic-bezier(.34,1.56,.64,1) forwards; }
  @keyframes rewardPop { 0%{transform:scale(0) rotate(-20deg);opacity:0} 100%{transform:scale(1) rotate(0);opacity:1} }
  .result-msg { font-size:1.05rem; color:#5a3a10; font-weight:600; margin-bottom:24px; line-height:1.6; }
  .score-badge { display:inline-block; background:linear-gradient(135deg,#f5c518,#e6a800); color:#5a3000; font-family:'Fredoka One',cursive; font-size:1rem; padding:6px 20px; border-radius:30px; margin-bottom:20px; box-shadow:0 3px 0 #a07800; }

  /* CONFETTI */
  .confetti-piece { position:fixed; width:10px; height:10px; border-radius:2px; animation:confettiFall linear forwards; z-index:200; pointer-events:none; }
  @keyframes confettiFall { 0%{transform:translateY(-20px) rotate(0);opacity:1} 100%{transform:translateY(105vh) rotate(720deg);opacity:0} }

  /* UI chrome */
  .sound-toggle { position:fixed; top:16px; right:16px; z-index:300; background:rgba(255,248,220,.8); border:2px solid #c9a050; border-radius:50%; width:44px; height:44px; font-size:22px; cursor:pointer; display:flex; align-items:center; justify-content:center; box-shadow:0 2px 8px rgba(0,0,0,.2); transition:transform .2s; }
  .sound-toggle:hover{transform:scale(1.1)}
  .streak { position:fixed; top:16px; left:16px; z-index:300; background:rgba(255,248,220,.88); border:2px solid #c9a050; border-radius:30px; padding:6px 14px; font-family:'Fredoka One',cursive; font-size:1rem; color:#7a4a00; box-shadow:0 2px 8px rgba(0,0,0,.15); }
  .wiggle{animation:wiggle .5s ease}
  @keyframes wiggle{0%,100%{transform:rotate(0)}20%{transform:rotate(-8deg) scale(1.1)}60%{transform:rotate(8deg) scale(1.1)}}
</style>
</head>
<body>

<div class="bg">
  <div class="sky-gradient"></div>
  <div class="sun"></div>
  <div class="cloud cloud-1"></div>
  <div class="cloud cloud-2"></div>
  <div class="cloud cloud-3"></div>
  <div class="ground"></div>
  <div class="rock rock-1"></div>
  <div class="rock rock-2"></div>
  <div class="rock rock-3"></div>
  <div class="rock rock-4"></div>
  <div class="cactus cactus-1"><div class="cactus-body"></div><div class="cactus-arm"></div></div>
  <div class="cactus cactus-2"><div class="cactus-body"></div><div class="cactus-arm"></div><div class="cactus-arm cactus-arm2"></div></div>
  <span class="fly fly-1">🦗</span>
  <span class="fly fly-2">🦟</span>
  <span class="fly fly-3">🪲</span>
</div>

<button class="sound-toggle" id="soundToggle">🔊</button>
<div class="streak" id="streakBadge">🔥 Seria: 0</div>
<div class="explosion-overlay" id="explosionOverlay"></div>

<!-- PAGE 1: HOME -->
<div class="page active" id="page-home">
  <div class="card">
    <div class="page-title">🦎 Agama Brodata</div>
    <div class="page-sub">Twój pustynny przyjaciel czeka na obiad...</div>
    <span class="agama-art" id="homeAgama">🦎</span>
    <div class="hunger-label">🍽️ Głód</div>
    <div class="hunger-bar"><div class="hunger-fill" id="hungerFill" style="width:72%"></div></div>
    <button class="btn" onclick="goTo('page-lucky')">🍴 Nakarm agamę</button>
  </div>
</div>

<!-- PAGE 2: LUCKY BLOCK -->
<div class="page" id="page-lucky">
  <div class="card">
    <div class="page-title" style="font-size:1.8rem">🍀 Co dzisiaj zje agama?</div>
    <div class="lucky-block-wrap" style="margin-top:16px">
      <div class="lucky-block" id="luckyBlock">
        <div class="lb-face lb-front"></div>
        <div class="lb-face lb-back"></div>
        <div class="lb-face lb-right"></div>
        <div class="lb-face lb-left"></div>
        <div class="lb-face lb-top"></div>
        <div class="lb-face lb-bottom"></div>
      </div>
    </div>
    <div class="odds-frame">
      <span>🦗 <span class="odds-pct">40%</span></span>
      <span>🪳 karaczan <span class="odds-pct">45%</span></span>
      <span>🪱 <span class="odds-pct">15%</span></span>
    </div>
    <button class="btn btn-sm" id="openBtn" onclick="openLuckyBlock()">✨ Otwórz</button>
    <button class="btn btn-sm" id="continueBtn" style="display:none" onclick="goToResult()">▶️ Kontynuuj</button>
  </div>
</div>

<!-- PAGE 3: RESULT -->
<div class="page" id="page-result">
  <div class="card">
    <span class="result-big-emoji" id="resultBigEmoji"></span>
    <div class="result-title" id="resultTitle"></div>
    <div class="result-msg" id="resultMsg"></div>
    <div class="score-badge" id="scoreBadge"></div>
    <button class="btn btn-sm" id="tryAgainBtn" style="display:none" onclick="goTo('page-home')">🔄 Spróbuj ponownie</button>
    <button class="btn btn-sm" id="winHomeBtn" style="display:none" onclick="goTo('page-home')">🏠 Wróć do domu</button>
  </div>
</div>

<script>
  let soundOn = true, streak = 0, totalFeeds = 0, reward = null;
  const AudioCtx = window.AudioContext || window.webkitAudioContext;
  let ctx = null;

  function getCtx() { if (!ctx) ctx = new AudioCtx(); return ctx; }
  function playTone(f, d, t='sine', g=0.3) {
    if (!soundOn) return;
    try { const a=getCtx(),o=a.createOscillator(),gn=a.createGain(); o.connect(gn); gn.connect(a.destination); o.type=t; o.frequency.setValueAtTime(f,a.currentTime); gn.gain.setValueAtTime(g,a.currentTime); gn.gain.exponentialRampToValueAtTime(0.001,a.currentTime+d); o.start(); o.stop(a.currentTime+d); } catch(e){}
  }
  function playHurra() { [523,659,784,1047].forEach((n,i)=>setTimeout(()=>playTone(n,.3,'triangle',.4),i*140)); }
  function playFail() { [440,330,220].forEach((n,i)=>setTimeout(()=>playTone(n,.25,'sawtooth',.2),i*120)); }
  function playClick() { playTone(800,.08,'sine',.15); }
  function playExplode() {
    if (!soundOn) return;
    try { const a=getCtx(),buf=a.createBuffer(1,a.sampleRate*.4,a.sampleRate),data=buf.getChannelData(0); for(let i=0;i<data.length;i++)data[i]=(Math.random()*2-1)*Math.exp(-i/(a.sampleRate*.08)); const src=a.createBufferSource(),g=a.createGain(); src.buffer=buf; src.connect(g); g.connect(a.destination); g.gain.setValueAtTime(.5,a.currentTime); src.start(); } catch(e){}
  }

  function goTo(id) {
    playClick();
    document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    if (id === 'page-lucky') {
      document.getElementById('openBtn').style.display='';
      document.getElementById('continueBtn').style.display='none';
      const lb = document.getElementById('luckyBlock');
      lb.style.animation='spinBlock 2.5s linear infinite';
      lb.querySelectorAll('.lb-face').forEach(f=>{ f.classList.remove('revealed'); f.innerHTML=''; f.style.background=''; });
      reward = null;
    }
    if (id === 'page-home') updateHunger();
  }

  function updateHunger() {
    const pct = Math.max(5, 72 - totalFeeds * 18);
    const fill = document.getElementById('hungerFill');
    fill.style.width = pct + '%';
    fill.style.background = pct > 40 ? 'linear-gradient(90deg,#ff9500,#ffcc00)' : 'linear-gradient(90deg,#e74c3c,#ff6b35)';
  }

  function openLuckyBlock() {
    playClick();
    const roll = Math.random() * 100;
    reward = roll < 40 ? '🦗' : roll < 85 ? '🪳' : '🪱';
    const lb = document.getElementById('luckyBlock');
    lb.style.animation = 'spinBlock 0.3s linear infinite';
    setTimeout(() => {
      lb.style.animation = 'none';
      playExplode();
      triggerExplosion(lb);
      setTimeout(() => {
        lb.querySelectorAll('.lb-face').forEach(f=>{ f.classList.add('revealed'); f.innerHTML=`<span style="font-size:55px">${reward}</span>`; f.style.background='linear-gradient(135deg,#fff7aa,#ffe033)'; });
        document.getElementById('openBtn').style.display='none';
        document.getElementById('continueBtn').style.display='';
      }, 400);
    }, 900);
  }

  function triggerExplosion(el) {
    const ov=document.getElementById('explosionOverlay'); ov.innerHTML=''; ov.classList.add('boom');
    const r=el.getBoundingClientRect(), cx=r.left+r.width/2, cy=r.top+r.height/2;
    const cols=['#ffe033','#ff9500','#ff3030','#30ff90','#3090ff','#ff30cc','#ffcc00'];
    for(let i=0;i<40;i++){
      const p=document.createElement('div'); p.className='particle';
      const a=Math.random()*360, d=60+Math.random()*140;
      p.style.cssText=`left:${cx}px;top:${cy}px;background:${cols[~~(Math.random()*cols.length)]};--dx:${Math.cos(a*Math.PI/180)*d}px;--dy:${Math.sin(a*Math.PI/180)*d}px;animation-duration:${.5+Math.random()*.5}s`;
      ov.appendChild(p);
    }
    setTimeout(()=>{ ov.classList.remove('boom'); ov.innerHTML=''; },1000);
  }

  function goToResult() {
    playClick(); totalFeeds++;
    const notHungryRoll = Math.random();
    let outcome;
    if (reward==='🪱' && notHungryRoll<.4) outcome='escape';
    else if (notHungryRoll<.12) outcome='notHungry';
    else outcome='win';

    const bigEmoji=document.getElementById('resultBigEmoji');
    const title=document.getElementById('resultTitle');
    const msg=document.getElementById('resultMsg');
    const score=document.getElementById('scoreBadge');
    document.getElementById('tryAgainBtn').style.display='none';
    document.getElementById('winHomeBtn').style.display='none';

    if (outcome==='win') {
      streak++;
      bigEmoji.textContent=reward==='🦗'?'🦎🦗':reward==='🪳'?'🦎🪳':'🦎🪱';
      title.textContent='Udało się!'; title.className='result-title win';
      const names={'🦗':'świerszcza','🪳':'karaczana','🪱':'robaka'};
      msg.innerHTML=`Agama brodata zjadła <strong>${reward}</strong> ${names[reward]}!<br>Mniam mniam, pyszne! 😋`;
      score.textContent=`🏆 Seria: ${streak} | Łącznie karmień: ${totalFeeds}`;
      document.getElementById('winHomeBtn').style.display='';
      playHurra(); launchConfetti();
    } else if (outcome==='escape') {
      streak=0;
      bigEmoji.textContent='👺';
      title.textContent='Robak uciekł! 👺👺👺'; title.className='result-title fail';
      msg.innerHTML=`${reward} był za szybki! Agama nawet nie zdążyła mrugnąć...<br>Spróbuj jeszcze raz!`;
      score.textContent=`💀 Seria przerwana | Karmień: ${totalFeeds}`;
      document.getElementById('tryAgainBtn').style.display='';
      playFail();
    } else {
      streak=0;
      bigEmoji.textContent='😴';
      title.textContent='Agama nie jest głodna!'; title.className='result-title nothungry';
      msg.innerHTML=`Agama właśnie się zdrzemnęła na ciepłym kamieniu...<br>Nie ma teraz czasu na jedzenie! ☀️🪨`;
      score.textContent=`😴 Odpoczywa... Karmień: ${totalFeeds}`;
      document.getElementById('tryAgainBtn').style.display='';
      playTone(440,.4,'sine',.2);
    }

    document.getElementById('streakBadge').textContent=`🔥 Seria: ${streak}`;
    document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
    document.getElementById('page-result').classList.add('active');
    updateHunger();
  }

  function launchConfetti() {
    const cols=['#ffe033','#ff9500','#5adc5a','#5a90ff','#ff5aaa','#ff3030'];
    for(let i=0;i<60;i++){
      setTimeout(()=>{
        const c=document.createElement('div'); c.className='confetti-piece';
        c.style.cssText=`left:${Math.random()*100}vw;top:-20px;background:${cols[~~(Math.random()*cols.length)]};width:${6+Math.random()*10}px;height:${6+Math.random()*10}px;animation-duration:${2+Math.random()*2}s;border-radius:${Math.random()>.5?'50%':'2px'}`;
        document.body.appendChild(c);
        setTimeout(()=>c.remove(),4000);
      },i*40);
    }
  }

  document.getElementById('soundToggle').onclick=()=>{
    soundOn=!soundOn;
    document.getElementById('soundToggle').textContent=soundOn?'🔊':'🔇';
  };

  document.getElementById('homeAgama').onclick=function(){
    this.classList.remove('wiggle'); void this.offsetWidth; this.classList.add('wiggle');
    playTone(600+Math.random()*400,.1,'triangle',.2);
  };
</script>
</body>
</html>
